name: Build ST-Ctrl APK + Auto Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x tavern-app/gradlew

      - name: Build Release APK
        run: |
          cd tavern-app
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: st-ctrl-release
          path: tavern-app/app/build/outputs/apk/release/app-release.apk

      - name: Get version and date
        id: get_info
        run: |
          VERSION=$(cat tavern-app/app/src/main/assets/core/version.txt | tr -d '[:space:]')
          DATE=$(date +'%Y%m%d')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "apk_path=tavern-app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_info.outputs.version }}
          name: ST-Ctrl v${{ steps.get_info.outputs.version }} (${{ steps.get_info.outputs.date }})
          body: |
            ## ST-Ctrl v${{ steps.get_info.outputs.version }}

            ### 内置功能
            - ✅ 酒馆核心自动更新（从本仓库拉取）
            - ✅ PluginBridge 服务器（端口 3001）
              - 共享变量存储（命名空间、TTL、持久化）
              - 事件总线（WebSocket + HTTP）
              - AI API 代理（解决 CORS）
            - ✅ 局域网访问支持（绑定 0.0.0.0）
            - ✅ 自动 CI/CD 编译（Release 版本）

            ### 安装说明
            1. 下载下方 APK 文件
            2. 在 Android 手机上允许「未知来源」安装
            3. 安装并打开 APP
            4. APP 会自动从本仓库检查并下载酒馆核心更新

            ### 源码
            ${{ github.server_url }}/${{ github.repository }}
          files: ${{ steps.get_info.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
