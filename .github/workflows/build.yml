name: Build ST-Ctrl APK + Auto Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Diagnose repository state
        run: |
          echo "=== Repo root ==="
          ls -la
          echo "=== tavern-app/ ==="
          ls -la tavern-app/
          echo "=== core file count ==="
          find tavern-app/app/src/main/assets/core -type f 2>/dev/null | wc -l
          echo "=== core dir size ==="
          du -sh tavern-app/app/src/main/assets/core 2>/dev/null || echo "core dir missing"
          echo "=== libnode.so ==="
          ls -la tavern-app/app/src/main/jniLibs/*/libnode.so 2>/dev/null || echo "libnode.so missing"
          echo "=== package.json exists ==="
          ls -la tavern-app/app/src/main/assets/core/package.json 2>/dev/null || echo "package.json missing"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js (for npm install in tavern-core)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('tavern-app/*.gradle*', 'tavern-app/**/*.gradle*', 'tavern-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x tavern-app/gradlew

      - name: Build Release APK
        timeout-minutes: 40
        run: |
          cd tavern-app
          ./gradlew assembleRelease --no-daemon --stacktrace --info 2>&1 | tail -500
        env:
          NODEJS_MOBILE_CI: true

      - name: Show core state after build
        if: always()
        run: |
          echo "=== core files after build ==="
          find tavern-app/app/src/main/assets/core -maxdepth 1 -type f 2>/dev/null | head -20
          echo "=== core size ==="
          du -sh tavern-app/app/src/main/assets/core 2>/dev/null || echo "core missing"
          echo "=== libnode.so after build ==="
          ls -la tavern-app/app/src/main/jniLibs/*/libnode.so 2>/dev/null || echo "libnode.so still missing"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: st-ctrl-release
          path: tavern-app/app/build/outputs/apk/release/app-release.apk

      - name: Get version and date
        id: get_info
        run: |
          # 优先从 package.json 读取 version；如果 package.json 不存在/没有 version 字段，回退到 version.txt
          if [ -f "tavern-app/app/src/main/assets/core/package.json" ]; then
            VERSION=$(node -e "console.log((JSON.parse(require('fs').readFileSync('tavern-app/app/src/main/assets/core/package.json','utf8'))).version || '')")
          fi
          if [ -z "$VERSION" ] && [ -f "tavern-app/app/src/main/assets/core/version.txt" ]; then
            VERSION=$(cat tavern-app/app/src/main/assets/core/version.txt | tr -d '[:space:]')
          fi
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          DATE=$(date +'%Y%m%d')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "apk_path=tavern-app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION (date: $DATE)"

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_info.outputs.version }}
          name: ST-Ctrl v${{ steps.get_info.outputs.version }} (${{ steps.get_info.outputs.date }})
          body: |
            ## ST-Ctrl v${{ steps.get_info.outputs.version }}

            ### 内置功能
            - ✅ 酒馆核心自动更新（从本仓库拉取）
            - ✅ PluginBridge 服务器（端口 3001）
              - 共享变量存储（命名空间、TTL、持久化）
              - 事件总线（WebSocket + HTTP）
              - AI API 代理（解决 CORS）
            - ✅ 局域网访问支持（绑定 0.0.0.0）
            - ✅ 自动 CI/CD 编译（Release 版本）

            ### 安装说明
            1. 下载下方 APK 文件
            2. 在 Android 手机上允许「未知来源」安装
            3. 安装并打开 APP
            4. APP 会自动从本仓库检查并下载酒馆核心更新

            ### 源码
            ${{ github.server_url }}/${{ github.repository }}
          files: ${{ steps.get_info.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
