name: Build ST-Ctrl APK + Auto Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xmx4g -XX:MaxMetaspaceSize=1g
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('tavern-app/*.gradle*', 'tavern-app/**/*.gradle*', 'tavern-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x tavern-app/gradlew

      - name: Build Release APK
        timeout-minutes: 30
        run: |
          cd tavern-app
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        run: |
          APK="tavern-app/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK" ]; then
            SIZE=$(ls -lh "$APK" | awk '{print $5}')
            echo "APK built successfully: $APK ($SIZE)"
          else
            echo "ERROR: APK not found at $APK"
            ls -laR tavern-app/app/build/outputs/
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: st-ctrl-release
          path: tavern-app/app/build/outputs/apk/release/app-release.apk

      - name: Get version and date
        id: get_info
        run: |
          VERSION="1.0.0"
          if [ -f "tavern-app/app/src/main/assets/core/update_info.json" ]; then
            VERSION=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('tavern-app/app/src/main/assets/core/update_info.json','utf8')).version)}catch(e){console.log('1.0.0')}")
          fi
          DATE=$(date +'%Y%m%d')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "apk_path=tavern-app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION (date: $DATE)"

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_info.outputs.version }}
          name: ST-Ctrl v${{ steps.get_info.outputs.version }} (${{ steps.get_info.outputs.date }})
          body: |
            ## ST-Ctrl v${{ steps.get_info.outputs.version }}

            ### 轻量壳 APP — 核心代码首次启动时自动下载
            - 启动 APP 后自动从 GitHub Release 下载 `tavern-core.zip`（酒馆核心）
            - 解压到 APP 数据目录后 Node.js 启动酒馆服务
            - 之后更新核心：在仓库 Release 上传新的 `tavern-core.zip`，并在 `update_info.json` 中更新 `version` 字段，APP 下次启动会自动检测并更新

            ### 内置功能
            - 基于 SillyTavern 的 AI 聊天前端
            - Android WebView 展示 UI + Node.js 运行时驱动核心
            - 端口可自定义（设置页面）
            - 开发者模式支持侧载核心（手机本地目录替换核心代码）

            ### 安装说明
            1. 下载下方 APK 文件
            2. 在 Android 手机上允许「未知来源」安装
            3. 安装并打开 APP（首次启动需要联网下载核心）
            4. 等待核心下载解压完成后即可使用

            ### 源码
            ${{ github.server_url }}/${{ github.repository }}
          files: ${{ steps.get_info.outputs.apk_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
