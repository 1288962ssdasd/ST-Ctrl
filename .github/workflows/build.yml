name: Build ST-Ctrl APK + Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x tavern-app/gradlew

      - name: Build Debug APK
        run: |
          cd tavern-app
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: st-ctrl-debug
          path: tavern-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat tavern-app/app/src/main/assets/core/version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: ST-Ctrl v${{ steps.get_version.outputs.version }}
          body: |
            ## ST-Ctrl v${{ steps.get_version.outputs.version }}

            ### 更新内容
            - 酒馆核心更新源已切换至本仓库
            - 内置 PluginBridge 服务器（端口 3001）
            - 自动 CI/CD 编译

            ### 安装说明
            1. 下载 APK
            2. 在 Android 手机上允许「未知来源」安装
            3. 安装并打开 APP
          files: tavern-app/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
